<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stock Portfolio Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --font-sans: 'Prompt', sans-serif;
      --color-background-page: #f0f2f5;
      --color-background-panel: #ffffff;
      --color-background-secondary: #f8fafc;
      --color-text-primary: #1e293b;
      --color-text-secondary: #475569;
      --color-text-tertiary: #64748b;
      --color-text-info: #0284c7;
      --color-border-primary: #cbd5e1;
      --color-border-secondary: #e2e8f0;
      --color-border-tertiary: #f1f5f9;
      --border-radius-md: 8px;
      --border-radius-lg: 16px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-sans); background-color: var(--color-background-page); color: var(--color-text-primary); padding: 2rem 1rem; min-height: 100vh; }
    .dash-container { max-width: 1100px; margin: 0 auto; background: var(--color-background-panel); border-radius: var(--border-radius-lg); box-shadow: 0 4px 20px rgba(0,0,0,0.05); padding: 2rem; position: relative; }
    .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; flex-wrap: wrap; gap: 15px; }
    .lang-switcher { display: flex; background: var(--color-background-secondary); padding: 4px; border-radius: 8px; border: 1px solid var(--color-border-primary); }
    .lang-btn { padding: 4px 12px; border: none; background: transparent; cursor: pointer; font-size: 12px; font-weight: 600; border-radius: 5px; color: var(--color-text-tertiary); }
    .lang-btn.active { background: var(--color-text-info); color: white; }
    .btn-refresh { background-color: var(--color-text-info); color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 500; }
    .section-label { font-size: 12px; font-weight: 500; letter-spacing: 0.05em; color: var(--color-text-tertiary); text-transform: uppercase; margin-bottom: 12px; }
    .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 1.5rem; }
    .metric { background: var(--color-background-secondary); border: 1px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 16px; }
    .metric-label { font-size: 12px; color: var(--color-text-tertiary); margin-bottom: 8px; }
    .metric-value { font-size: 22px; font-weight: 500; }
    .up, .pnl-up { color: #1D9E75 !important; }
    .down, .pnl-down { color: #D85A30 !important; }
    .table-wrap { overflow-x: auto; border: 1px solid var(--color-border-secondary); border-radius: var(--border-radius-md); }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    thead th { font-size: 12px; font-weight: 500; color: var(--color-text-tertiary); text-align: right; padding: 12px 16px; background: var(--color-background-secondary); }
    thead th:first-child { text-align: left; }
    tbody td { padding: 12px 16px; text-align: right; border-bottom: 1px solid var(--color-border-tertiary); }
    tbody td:first-child { text-align: left; }
    .card { background: var(--color-background-panel); border: 1px solid var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 1.25rem 1.5rem; }
    .two-col { display: grid; grid-template-columns: 1.5fr 1fr; gap: 20px; margin-top: 2rem; }
    @media (max-width: 768px) { .two-col { grid-template-columns: 1fr; } }
    #loading-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(255,255,255,0.9); display: flex; justify-content: center; align-items: center; z-index: 100; border-radius: 16px; }
  </style>
</head>
<body>
<div class="dash-container">
  <div id="loading-overlay">⏳ Loading Portfolio Data...</div>
  <div class="top-bar">
    <div><h2 class="top-title" data-i18n="top_title">My Stock Portfolio</h2><div id="current-date" style="font-size:12px; color:var(--color-text-tertiary)"></div></div>
    <div style="display:flex; align-items:center; gap:12px;">
      <div class="lang-switcher">
        <button class="lang-btn" id="lang-en" onclick="changeLanguage('en')">EN</button>
        <button class="lang-btn" id="lang-th" onclick="changeLanguage('th')">TH</button>
      </div>
      <button id="refresh-btn" class="btn-refresh" onclick="fetchLivePrices()" data-i18n="btn_refresh">🔄 Update Prices</button>
    </div>
  </div>
  <div class="section-label" data-i18n="overview_label">Portfolio Overview</div>
  <div class="metrics" id="metrics-row"></div>
  <div class="section-label" data-i18n="trades_label">Trade History</div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th data-i18n="th_stock">Stock</th>
          <th data-i18n="th_date">Date</th>
          <th data-i18n="th_shares">Shares</th>
          <th data-i18n="th_cost_thb">Cost (THB)</th> <!-- เพิ่มคอลัมน์ต้นทุนเงินบาท -->
          <th data-i18n="th_cost_usd">Cost (USD)</th>
          <th data-i18n="th_last_usd">Last (USD)</th>
          <th data-i18n="th_val_thb">Value (THB)</th>
          <th data-i18n="th_val_usd">Value (USD)</th>
          <th data-i18n="th_pnl">P&L</th>
        </tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>
  </div>
  <div class="two-col">
    <div class="card"><div class="section-label" data-i18n="growth_chart_title">Portfolio Growth (THB)</div><div style="height:300px;"><canvas id="growthChart"></canvas></div></div>
    <div class="card"><div class="section-label" data-i18n="ticker_chart_title">Stock Allocation (%)</div><div style="height:300px;"><canvas id="tickerPieChart"></canvas></div></div>
  </div>
  <div id="update-time-note" style="font-size:11px; color:var(--color-text-tertiary); text-align:center; margin-top:20px;"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script>
  const i18n = {
    en: { top_title: "My Stock Portfolio", btn_refresh: "Update Prices", overview_label: "Portfolio Overview", trades_label: "Trade History", th_stock: "Stock", th_date: "Date", th_shares: "Shares", th_cost_thb: "Cost (THB)", th_cost_usd: "Cost (USD)", th_last_usd: "Last (USD)", th_val_thb: "Value (THB)", th_val_usd: "Value (USD)", th_pnl: "P&L", th_total: "Total", metric_cost: "Total Cost (THB)", metric_val_thb: "Current Value (THB)", metric_val_usd: "Current Value (USD)", metric_pnl: "Total P&L (USD)", metric_ex: "USD/THB Rate", growth_chart_title: "Portfolio Growth (THB)", ticker_chart_title: "Stock Allocation (%)", chart_cost: "Cumulative Cost", chart_value: "Market Value" },
    th: { top_title: "พอร์ตหุ้นของฉัน", btn_refresh: "อัพเดทราคาล่าสุด", overview_label: "ภาพรวมพอร์ต", trades_label: "รายการซื้อขาย", th_stock: "หุ้น", th_date: "วันที่", th_shares: "จำนวนหุ้น", th_cost_thb: "ต้นทุน (THB)", th_cost_usd: "ต้นทุน (USD)", th_last_usd: "ราคาล่าสุด (USD)", th_val_thb: "มูลค่า (THB)", th_val_usd: "มูลค่า (USD)", th_pnl: "กำไร/ขาดทุน", th_total: "รวม", metric_cost: "ต้นทุนรวม (THB)", metric_val_thb: "มูลค่าปัจจุบัน (THB)", metric_val_usd: "มูลค่าปัจจุบัน (USD)", metric_pnl: "กำไร/ขาดทุนรวม (USD)", metric_ex: "ค่าเงิน USD/THB", growth_chart_title: "การเติบโตของพอร์ต (THB)", ticker_chart_title: "สัดส่วนหุ้น (%)", chart_cost: "ต้นทุนสะสม", chart_value: "มูลค่าตามตลาด" }
  };

  let currentLang = localStorage.getItem('dash_lang') || 'en';
  let trades = [], livePrices = {}, liveExRate = 35.0, charts = {};
  const FINNHUB_KEY = 'd81cmgpr01qler4hqqfgd81cmgpr01qler4hqqg0';
  const CSV_URL = 'https://docs.google.com/spreadsheets/d/1zv1K04AhC0-oOw-vYBhrtq9KV7pqS2P2SnGWTg8S5Ls/export?format=csv';

  async function fetchExRate() {
    try {
      const response = await fetch('https://api.exchangerate-api.com/v4/latest/USD');
      const data = await response.json();
      if (data && data.rates && data.rates.THB) {
        liveExRate = data.rates.THB;
      }
    } catch (e) { 
      console.warn("API Error, stay at fallback 35.0"); 
    }
  }

  function fetchTrades() {
    Papa.parse(CSV_URL, {
      download: true, header: false, skipEmptyLines: true,
      complete: async function(results) {
        document.getElementById('loading-overlay').style.display = 'none';
        trades = results.data.slice(1).map(row => ({
          ticker: row[0]?.replace(/"/g, '').trim(),
          date: row[2]?.trim(),
          amountTHB: parseFloat(row[4]?.replace(/,/g, '') || 0),
          priceUSD: parseFloat(row[5]?.replace(/,/g, '') || 0),
          shares: parseFloat(row[6]?.replace(/,/g, '') || 0),
          amountUSD: parseFloat(row[8]?.replace(/,/g, '') || 0),
          account: row[9]?.replace(/"/g, '').trim()
        })).filter(t => t.ticker);
        
        trades.forEach(t => livePrices[t.ticker] = t.priceUSD);
        
        await fetchExRate();
        applyLanguage(currentLang);
        fetchLivePrices();
        setInterval(fetchLivePrices, 300000);
      }
    });
  }

  async function fetchLivePrices() {
    const btn = document.getElementById('refresh-btn');
    btn.disabled = true;
    await fetchExRate();
    const tickers = [...new Set(trades.map(t => t.ticker))];
    for (let s of tickers) {
      try {
        const res = await fetch(`https://finnhub.io/api/v1/quote?symbol=${s}&token=${FINNHUB_KEY}`);
        const data = await res.json();
        if (data.c) livePrices[s] = data.c;
      } catch (e) {}
    }
    renderAll();
    btn.disabled = false;
    document.getElementById('update-time-note').innerText = `Last updated: ${new Date().toLocaleTimeString()} (Auto-update every 5m)`;
  }

  function changeLanguage(lang) {
    currentLang = lang;
    localStorage.setItem('dash_lang', lang);
    applyLanguage(lang);
    renderAll();
  }

  function applyLanguage(lang) {
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(`lang-${lang}`).classList.add('active');
    document.querySelectorAll('[data-i18n]').forEach(el => el.innerText = i18n[lang][el.dataset.i18n]);
    document.getElementById('current-date').innerText = new Date().toLocaleDateString(lang === 'th' ? 'th-TH' : 'en-US', { year:'numeric', month:'long', day:'numeric' });
  }

  function formatNum(n, d = 2) { return n.toLocaleString(undefined, { minimumFractionDigits: d, maximumFractionDigits: d }); }

  function renderMetrics() {
    const costTHB = trades.reduce((s, t) => s + t.amountTHB, 0);
    let valUSD = 0, costUSD = 0;
    trades.forEach(t => {
      costUSD += t.amountUSD;
      valUSD += (livePrices[t.ticker] || t.priceUSD) * t.shares;
    });
    const valTHB = valUSD * liveExRate;
    const pnlUSD = valUSD - costUSD;
    const pnlPct = costUSD > 0 ? (pnlUSD / costUSD) * 100 : 0;

    document.getElementById('metrics-row').innerHTML = `
      <div class="metric"><div class="metric-label">${i18n[currentLang].metric_cost}</div><div class="metric-value">฿${formatNum(costTHB, 0)}</div></div>
      <div class="metric"><div class="metric-label">${i18n[currentLang].metric_val_thb}</div><div class="metric-value">฿${formatNum(valTHB, 0)}</div></div>
      <div class="metric"><div class="metric-label">${i18n[currentLang].metric_val_usd}</div><div class="metric-value">$${formatNum(valUSD)}</div></div>
      <div class="metric"><div class="metric-label">${i18n[currentLang].metric_pnl}</div><div class="metric-value ${pnlUSD>=0?'up':'down'}">${pnlUSD>=0?'+':''}$${formatNum(Math.abs(pnlUSD))}</div><div style="font-size:12px;" class="${pnlPct>=0?'up':'down'}">${pnlPct>=0?'+':''}${formatNum(pnlPct)}%</div></div>
      <div class="metric"><div class="metric-label">${i18n[currentLang].metric_ex}</div><div class="metric-value">฿${formatNum(liveExRate)}</div></div>
    `;
  }

  function renderTable() {
    let totalCostTHB = 0, totalCostUSD = 0, totalValTHB = 0, totalValUSD = 0, totalPnlUSD = 0;

    const rowsHTML = trades.map(t => {
      const curP = livePrices[t.ticker] || t.priceUSD;
      const curValUSD = curP * t.shares;
      const curValTHB = curValUSD * liveExRate;
      const pnl = curValUSD - t.amountUSD;
      const pnlPct = ((curP - t.priceUSD) / t.priceUSD) * 100;
      
      // คำนวณสะสมสำหรับแถวสรุปรวม (Footer)
      totalCostTHB += t.amountTHB;
      totalCostUSD += t.amountUSD;
      totalValTHB += curValTHB;
      totalValUSD += curValUSD;
      totalPnlUSD += pnl;

      return `<tr>
        <td><b>${t.ticker}</b></td>
        <td>${t.date}</td>
        <td>${t.shares.toFixed(4)}</td>
        <td>฿${formatNum(t.amountTHB, 0)}</td> <!-- ข้อมูลต้นทุน THB -->
        <td>$${formatNum(t.priceUSD)}</td>
        <td>$${formatNum(curP)}</td>
        <td style="font-weight:600">฿${formatNum(curValTHB, 0)}</td>
        <td>$${formatNum(curValUSD)}</td>
        <td class="${pnl>=0?'pnl-up':'pnl-down'}"><b>${pnl>=0?'+':''}$${formatNum(Math.abs(pnl))}</b><br><small>${pnlPct>=0?'+':''}${pnlPct.toFixed(2)}%</small></td>
      </tr>`;
    }).join('');

    const totalPnlPct = totalCostUSD > 0 ? (totalPnlUSD / totalCostUSD) * 100 : 0;

    // สร้างบรรทัดสรุปรวมท้ายตาราง
    const footerHTML = `
      <tr style="background: var(--color-border-tertiary); font-weight: 600;">
        <td colspan="3" style="text-align: right;">${i18n[currentLang].th_total}</td>
        <td>฿${formatNum(totalCostTHB, 0)}</td>
        <td>$${formatNum(totalCostUSD)}</td>
        <td>-</td>
        <td>฿${formatNum(totalValTHB, 0)}</td>
        <td>$${formatNum(totalValUSD)}</td>
        <td class="${totalPnlUSD>=0?'pnl-up':'pnl-down'}">
          ${totalPnlUSD>=0?'+':''}$${formatNum(Math.abs(totalPnlUSD))}<br>
          <small>${totalPnlPct>=0?'+':''}${formatNum(totalPnlPct)}%</small>
        </td>
      </tr>
    `;

    document.getElementById('table-body').innerHTML = rowsHTML + footerHTML;
  }

  function renderCharts() {
    // 1. Growth Chart
    const ctxG = document.getElementById('growthChart').getContext('2d');
    if (charts.growth) charts.growth.destroy();
    const sorted = [...trades].sort((a,b) => new Date(a.date) - new Date(b.date));
    let sumCost = 0;
    const labels = sorted.map(t => t.date), costData = [], valueData = [];
    sorted.forEach(t => {
      sumCost += t.amountTHB; costData.push(sumCost);
      let curSumVal = 0;
      const upToNow = sorted.filter(x => x.date <= t.date);
      upToNow.forEach(x => curSumVal += (livePrices[x.ticker] || x.priceUSD) * x.shares * liveExRate);
      valueData.push(curSumVal);
    });
    charts.growth = new Chart(ctxG, {
      type: 'line',
      data: { labels, datasets: [
        { label: i18n[currentLang].chart_value, data: valueData, borderColor: '#1D9E75', fill: true, backgroundColor: 'rgba(29,158,117,0.1)', tension: 0.3 },
        { label: i18n[currentLang].chart_cost, data: costData, borderColor: '#94a3b8', borderDash: [5, 5], fill: false }
      ]},
      options: { responsive: true, maintainAspectRatio: false }
    });

    // 2. Pie Chart
    const ctxP = document.getElementById('tickerPieChart').getContext('2d');
    if (charts.pie) charts.pie.destroy();
    const byTicker = {};
    trades.forEach(t => byTicker[t.ticker] = (byTicker[t.ticker]||0) + (livePrices[t.ticker] || t.priceUSD) * t.shares * liveExRate);
    const dataValues = Object.values(byTicker);
    const totalV = dataValues.reduce((a, b) => a + b, 0);
    const labelsWithPercent = Object.keys(byTicker).map((l, i) => `${l} (${((dataValues[i]/totalV)*100).toFixed(1)}%)`);

    charts.pie = new Chart(ctxP, {
      type: 'doughnut',
      data: { labels: labelsWithPercent, datasets: [{ data: dataValues, backgroundColor: ['#1D9E75','#0284c7','#BA7517','#D85A30','#533AB7','#E63946','#F4A261'] }]},
      options: { 
        responsive: true, 
        maintainAspectRatio: false, 
        plugins: { 
          legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 11 } } },
          tooltip: {
            callbacks: {
              label: (item) => ` ฿${formatNum(item.raw, 0)} (${((item.raw/totalV)*100).toFixed(1)}%)`
            }
          }
        }, 
        cutout: '65%' 
      }
    });
  }

  function renderAll() { renderMetrics(); renderTable(); renderCharts(); }
  fetchTrades();
</script>
</body>
</html>
